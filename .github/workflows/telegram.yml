name: Telegram Test

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install requests

      - name: Run age test
        run: python test_age.py

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: player-layout
          path: player_layout.json
