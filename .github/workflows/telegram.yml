name: Test Player Price

on:
  workflow_dispatch:

jobs:
  test-price:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install requests

      - name: Test price query
        run: python test_price.py

      - name: Upload price test
        uses: actions/upload-artifact@v4
        with:
          name: price-test
          path: price_test.json
