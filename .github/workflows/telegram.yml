name: Telegram Test

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install requests

      - name: Run test_club.py
        env:
          AUTHORIZATION: ${{ secrets.AUTHORIZATION }}
        run: python test_club.py

      - name: Upload genk.json
        uses: actions/upload-artifact@v4
        with:
          name: genk-json
          path: genk.json
