name: Update Player Prices

on:
  workflow_dispatch:
    inputs:
      league:
        description: "League key"
        required: true
        default: "belgium"
      season:
        description: "Season start year"
        required: true
        default: "2025"
      snapshot:
        description: "Snapshot label, example: pre_gw01 or post_gw01"
        required: true
        default: "pre_gw01"
      offset:
        description: "Da quale giocatore partire"
        required: true
        default: "0"
      limit:
        description: "Quanti giocatori aggiornare"
        required: true
        default: "150"

permissions:
  contents: write

jobs:
  update-player-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull latest changes
        run: git pull origin main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install requests

      - name: Update player prices
        env:
          OFFSET_PLAYERS: ${{ github.event.inputs.offset }}
          LIMIT_PLAYERS: ${{ github.event.inputs.limit }}
        run: python update_player_prices.py --league ${{ github.event.inputs.league }} --season ${{ github.event.inputs.season }} --snapshot ${{ github.event.inputs.snapshot }}

      - name: Upload player prices latest
        uses: actions/upload-artifact@v4
        with:
          name: player-prices-latest-${{ github.event.inputs.league }}-${{ github.event.inputs.season }}
          path: data/${{ github.event.inputs.league }}/${{ github.event.inputs.season }}/player_prices_latest.json

      - name: Upload player prices snapshot
        uses: actions/upload-artifact@v4
        with:
          name: player-prices-${{ github.event.inputs.snapshot }}-${{ github.event.inputs.league }}-${{ github.event.inputs.season }}
          path: data/${{ github.event.inputs.league }}/${{ github.event.inputs.season }}/snapshots/player_prices_${{ github.event.inputs.snapshot }}.json

      - name: Commit player prices
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/${{ github.event.inputs.league }}/${{ github.event.inputs.season }}/player_prices_latest.json
          git add data/${{ github.event.inputs.league }}/${{ github.event.inputs.season }}/snapshots/player_prices_${{ github.event.inputs.snapshot }}.json

          git commit -m "Update player prices ${{ github.event.inputs.league }} ${{ github.event.inputs.season }} ${{ github.event.inputs.snapshot }}" || echo "No changes to commit"
          git push
