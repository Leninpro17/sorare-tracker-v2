name: Update Club List

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-club-list:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install requests

      - name: Update club list
        run: python update_club_list.py

      - name: Upload club list
        uses: actions/upload-artifact@v4
        with:
          name: club-list
          path: club_list.json

      - name: Commit club list
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add club_list.json
          git commit -m "Update club list" || echo "No changes to commit"
          git push
