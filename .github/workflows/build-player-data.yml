name: Build Player Data

on:
  workflow_dispatch:
    inputs:
      league:
        description: "League key"
        required: true
        default: "belgium"
      season:
        description: "Season start year"
        required: true
        default: "2025"

permissions:
  contents: write

jobs:
  build-player-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install requests

      - name: Build player data
        run: python build_player_data.py --league ${{ github.event.inputs.league }} --season ${{ github.event.inputs.season }}

      - name: Upload player data
        uses: actions/upload-artifact@v4
        with:
          name: player-data-${{ github.event.inputs.league }}-${{ github.event.inputs.season }}
          path: data/${{ github.event.inputs.league }}/${{ github.event.inputs.season }}/player_data.json

      - name: Commit player data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/${{ github.event.inputs.league }}/${{ github.event.inputs.season }}/player_data.json
          git commit -m "Update player data ${{ github.event.inputs.league }} ${{ github.event.inputs.season }}" || echo "No changes to commit"
          git push
